<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALLERY | 灼熱アニソン倶楽部</title>
<meta name="description" content="お気に入りシーンやジャケット、落書きまで。アニソン愛のビジュアルコレクション。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #120e0b;
    --bg-panel: #1c140f;
    --bg-panel-2: #241a13;
    --orange: #ffa500;
    --orange-deep: #ff6d00;
    --pink-pop: #ff2e63;
    --yellow-glow: #ffe066;
    --cream: #fff6ec;
    --muted: #cbb4a0;
    --line: rgba(255,165,0,0.22);
    --radius: 14px;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }

  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,165,0,0.14), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(255,46,99,0.09), transparent 55%),
      var(--bg);
    color:var(--cream);
    font-family:'Noto Sans JP', sans-serif;
    line-height:1.75;
    -webkit-font-smoothing:antialiased;
  }

  a{ color:inherit; text-decoration:none; }
  .jp-head{ font-family:'Zen Kaku Gothic New', sans-serif; font-weight:900; }
  .en-head{ font-family:'Bungee', 'Zen Kaku Gothic New', sans-serif; }

  /* ---------- NAV (shared) ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px clamp(20px,5vw,56px);
    background:rgba(18,14,11,0.72);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .logo{ display:flex; align-items:baseline; gap:8px; font-size:18px; }
  .logo .en-head{ color:var(--orange); font-size:16px; text-shadow:0 0 14px rgba(255,165,0,0.55); }
  .logo .jp-head{ font-size:16px; color:var(--cream); }

  nav ul{ display:flex; gap:clamp(14px,3vw,34px); list-style:none; margin:0; padding:0; }
  nav a{
    position:relative; font-size:14px; font-weight:700; padding:6px 2px; color:var(--muted);
    transition:color .25s ease;
  }
  nav a.active{ color:var(--orange); }
  nav a::after{
    content:""; position:absolute; left:0; bottom:0; width:0; height:2px;
    background:linear-gradient(90deg,var(--orange),var(--pink-pop));
    transition:width .25s ease;
  }
  nav a.active::after{ width:100%; }
  nav a:hover{ color:var(--cream); }
  nav a:hover::after{ width:100%; }
  nav a:focus-visible, a:focus-visible, button:focus-visible{ outline:2px solid var(--orange); outline-offset:3px; border-radius:3px; }

  .menu-btn{
    display:none; background:none; border:1px solid var(--line); border-radius:8px;
    color:var(--orange); font-size:20px; width:40px; height:40px; cursor:pointer;
  }

  /* ---------- PAGE HEADER ---------- */
  .page-head{
    max-width:720px; margin:0 auto;
    padding:150px 24px 50px;
    text-align:center;
  }
  .page-head .label{
    font-size:12px; letter-spacing:0.2em; color:var(--orange); font-weight:700; margin-bottom:16px;
  }
  .page-head h1{ font-size:clamp(30px,5vw,46px); margin:0; }
  .page-head p{ color:var(--muted); margin-top:16px; font-size:15px; }

  /* ---------- GALLERY GRID ---------- */
  .gallery{
    max-width:1100px; margin:0 auto;
    padding:20px 24px 140px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
  }
  .tile{
    position:relative;
    aspect-ratio:1/1;
    border-radius:var(--radius);
    overflow:hidden;
    border:1px solid var(--line);
    cursor:pointer;
    background:none;
    padding:0;
    display:block;
    width:100%;
  }
  .tile img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transition:transform .4s ease, filter .4s ease;
  }
  .tile:hover img{ transform:scale(1.06); }
  .tile::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 55%, rgba(18,14,11,0.85));
    opacity:0; transition:opacity .3s ease;
  }
  .tile:hover::after{ opacity:1; }
  .tile .cap{
    position:absolute; left:14px; right:14px; bottom:12px;
    font-size:13px; font-weight:700; color:var(--cream);
    opacity:0; transform:translateY(6px);
    transition:opacity .3s ease, transform .3s ease;
    z-index:1;
  }
  .tile:hover .cap{ opacity:1; transform:translateY(0); }

  /* ---------- LIGHTBOX ---------- */
  .lightbox{
    position:fixed; inset:0; z-index:200;
    background:rgba(10,7,5,0.92);
    display:none;
    align-items:center; justify-content:center;
    padding:40px 20px;
  }
  .lightbox.open{ display:flex; }
  .lightbox figure{
    margin:0; max-width:min(90vw, 900px); width:100%;
    text-align:center;
  }
  .lightbox img{
    width:100%; max-height:75vh;
    object-fit:contain;
    border-radius:10px;
    border:1px solid var(--line);
    box-shadow:0 0 60px rgba(255,165,0,0.15);
  }
  .lightbox figcaption{
    margin-top:16px; color:var(--muted); font-size:14px;
  }
  .lb-close, .lb-prev, .lb-next{
    position:absolute;
    background:rgba(28,20,15,0.8);
    border:1px solid var(--line);
    color:var(--cream);
    border-radius:50%;
    width:44px; height:44px;
    font-size:18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .2s ease, color .2s ease;
  }
  .lb-close:hover, .lb-prev:hover, .lb-next:hover{ border-color:var(--orange); color:var(--orange); }
  .lb-close{ top:24px; right:24px; }
  .lb-prev{ left:24px; top:50%; translate:0 -50%; }
  .lb-next{ right:24px; top:50%; translate:0 -50%; }

  footer{
    border-top:1px solid var(--line);
    padding:40px 24px; text-align:center; color:var(--muted); font-size:13px;
  }
  footer .en-head{ color:var(--orange); font-size:13px; letter-spacing:0.05em; }

  @media (max-width:860px){
    .gallery{ grid-template-columns:repeat(2, 1fr); }
  }
  @media (max-width:640px){
    .gallery{ grid-template-columns:1fr; }
    nav ul{
      position:fixed; top:64px; right:20px; left:20px;
      flex-direction:column; gap:0;
      background:rgba(24,17,13,0.97);
      border:1px solid var(--line); border-radius:12px;
      padding:8px; display:none;
    }
    nav ul.open{ display:flex; }
    nav a{ padding:14px 10px; }
    .menu-btn{ display:block; }
    .lb-prev{ left:10px; } .lb-next{ right:10px; }
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .tile img{ transition:none; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="en-head">ANISONG</span>
    <span class="jp-head">灼熱倶楽部</span>
  </a>
  <button class="menu-btn" id="menuBtn" aria-label="メニューを開く" aria-expanded="false">≡</button>
  <nav>
    <ul id="navList">
      <li><a href="index.html">HOME</a></li>
      <li><a href="blog.html">BLOG</a></li>
      <li><a href="playlist.html">PLAYLIST</a></li>
      <li><a href="gallery.html" class="active">GALLERY</a></li>
      <li><a href="about.html">ABOUT</a></li>
    </ul>
  </nav>
</header>

<section class="page-head">
  <p class="label">VISUAL</p>
  <h1 class="jp-head">GALLERY</h1>
  <p>お気に入りシーンや落書き。クリックで拡大表示。</p>
</section>

<!--
  ▼画像の差し替え方
  1. src="images/xxx.jpg" のパスを実際の画像ファイルに変更してください（同じフォルダに images/ を作るのがおすすめ）
  2. data-caption は拡大表示のときに出るキャプション文です
  3. .tile を丸ごとコピペすれば枚数を増やせます
-->
<section class="gallery" id="gallery">
  <button class="tile" data-caption="キャプションをここに">
    <img src="images/gallery-01.jpg" alt="キャプションをここに">
    <span class="cap">キャプションをここに</span>
  </button>
  <button class="tile" data-caption="キャプションをここに">
    <img src="images/gallery-02.jpg" alt="キャプションをここに">
    <span class="cap">キャプションをここに</span>
  </button>
  <button class="tile" data-caption="キャプションをここに">
    <img src="images/gallery-03.jpg" alt="キャプションをここに">
    <span class="cap">キャプションをここに</span>
  </button>
  <button class="tile" data-caption="キャプションをここに">
    <img src="images/gallery-04.jpg" alt="キャプションをここに">
    <span class="cap">キャプションをここに</span>
  </button>
  <button class="tile" data-caption="キャプションをここに">
    <img src="images/gallery-05.jpg" alt="キャプションをここに">
    <span class="cap">キャプションをここに</span>
  </button>
  <button class="tile" data-caption="キャプションをここに">
    <img src="images/gallery-06.jpg" alt="キャプションをここに">
    <span class="cap">キャプションをここに</span>
  </button>
</section>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="閉じる">✕</button>
  <button class="lb-prev" id="lbPrev" aria-label="前の画像">‹</button>
  <figure>
    <img id="lbImg" src="" alt="">
    <figcaption id="lbCap"></figcaption>
  </figure>
  <button class="lb-next" id="lbNext" aria-label="次の画像">›</button>
</div>

<footer>
  <p class="en-head">ANISONG CLUB</p>
  <p>&copy; 2026 灼熱アニソン倶楽部 — 非公式ファンサイトです。</p>
</footer>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const navList = document.getElementById('navList');
  menuBtn.addEventListener('click', () => {
    const isOpen = navList.classList.toggle('open');
    menuBtn.setAttribute('aria-expanded', isOpen);
  });

  const tiles = Array.from(document.querySelectorAll('.tile'));
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCap = document.getElementById('lbCap');
  let currentIndex = 0;

  function openLightbox(i){
    currentIndex = i;
    const tile = tiles[i];
    lbImg.src = tile.querySelector('img').src;
    lbImg.alt = tile.dataset.caption || '';
    lbCap.textContent = tile.dataset.caption || '';
    lightbox.classList.add('open');
  }
  function closeLightbox(){ lightbox.classList.remove('open'); }
  function showNext(delta){
    currentIndex = (currentIndex + delta + tiles.length) % tiles.length;
    openLightbox(currentIndex);
  }

  tiles.forEach((tile, i) => tile.addEventListener('click', () => openLightbox(i)));
  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', () => showNext(-1));
  document.getElementById('lbNext').addEventListener('click', () => showNext(1));
  lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', (e) => {
    if(!lightbox.classList.contains('open')) return;
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowRight') showNext(1);
    if(e.key === 'ArrowLeft') showNext(-1);
  });
</script>

</body>
</html>
