<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYLIST | 灼熱アニソン倶楽部</title>
<meta name="description" content="今よく聴いているアニソン・楽曲のプレイリスト。気分で随時更新。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #120e0b;
    --bg-panel: #1c140f;
    --bg-panel-2: #241a13;
    --orange: #ffa500;
    --orange-deep: #ff6d00;
    --pink-pop: #ff2e63;
    --yellow-glow: #ffe066;
    --cream: #fff6ec;
    --muted: #cbb4a0;
    --line: rgba(255,165,0,0.22);
    --radius: 14px;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }

  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,165,0,0.14), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(255,46,99,0.09), transparent 55%),
      var(--bg);
    color:var(--cream);
    font-family:'Noto Sans JP', sans-serif;
    line-height:1.75;
    -webkit-font-smoothing:antialiased;
  }

  a{ color:inherit; text-decoration:none; }
  .jp-head{ font-family:'Zen Kaku Gothic New', sans-serif; font-weight:900; }
  .en-head{ font-family:'Bungee', 'Zen Kaku Gothic New', sans-serif; }

  /* ---------- NAV (shared) ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px clamp(20px,5vw,56px);
    background:rgba(18,14,11,0.72);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .logo{ display:flex; align-items:baseline; gap:8px; font-size:18px; }
  .logo .en-head{ color:var(--orange); font-size:16px; text-shadow:0 0 14px rgba(255,165,0,0.55); }
  .logo .jp-head{ font-size:16px; color:var(--cream); }

  nav ul{ display:flex; gap:clamp(12px,2.6vw,28px); list-style:none; margin:0; padding:0; }
  nav a{
    position:relative; font-size:14px; font-weight:700; padding:6px 2px; color:var(--muted);
    transition:color .25s ease;
  }
  nav a.active{ color:var(--orange); }
  nav a::after{
    content:""; position:absolute; left:0; bottom:0; width:0; height:2px;
    background:linear-gradient(90deg,var(--orange),var(--pink-pop));
    transition:width .25s ease;
  }
  nav a.active::after{ width:100%; }
  nav a:hover{ color:var(--cream); }
  nav a:hover::after{ width:100%; }
  nav a:focus-visible, a:focus-visible{ outline:2px solid var(--orange); outline-offset:3px; border-radius:3px; }

  .menu-btn{
    display:none; background:none; border:1px solid var(--line); border-radius:8px;
    color:var(--orange); font-size:20px; width:40px; height:40px; cursor:pointer;
  }

  /* ---------- PAGE HEADER ---------- */
  .page-head{
    max-width:720px; margin:0 auto;
    padding:150px 24px 50px;
    text-align:center;
  }
  .page-head .label{
    font-size:12px; letter-spacing:0.2em; color:var(--orange); font-weight:700; margin-bottom:16px;
  }
  .page-head h1{ font-size:clamp(30px,5vw,46px); margin:0; }
  .page-head p{ color:var(--muted); margin-top:16px; font-size:15px; }

  /* ---------- PLAYLIST ---------- */
  .playlist{
    max-width:680px; margin:0 auto;
    padding:20px 24px 140px;
  }
  .track{
    display:flex; gap:16px;
    padding:22px 4px;
    border-bottom:1px solid var(--line);
  }
  .track:last-child{ border-bottom:none; }
  .track-icon{
    flex-shrink:0;
    width:38px; height:38px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    background:linear-gradient(160deg, rgba(255,165,0,0.16), rgba(255,46,99,0.12));
    border:1px solid var(--line);
    margin-top:2px;
  }
  .track-body{ flex:1; min-width:0; }
  .track-meta{
    display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
    margin-bottom:6px;
  }
  .track-title{ font-size:16px; font-weight:700; color:var(--cream); }
  .track-artist{ font-size:13px; color:var(--orange); font-weight:700; }
  .track-comment{ font-size:14px; color:var(--muted); }

  footer{
    border-top:1px solid var(--line);
    padding:40px 24px; text-align:center; color:var(--muted); font-size:13px;
  }
  footer .en-head{ color:var(--orange); font-size:13px; letter-spacing:0.05em; }

  @media (max-width:640px){
    nav ul{
      position:fixed; top:64px; right:20px; left:20px;
      flex-direction:column; gap:0;
      background:rgba(24,17,13,0.97);
      border:1px solid var(--line); border-radius:12px;
      padding:8px; display:none;
    }
    nav ul.open{ display:flex; }
    nav a{ padding:14px 10px; }
    .menu-btn{ display:block; }
    .track-meta{ flex-direction:column; gap:2px; }
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="en-head">ANISONG</span>
    <span class="jp-head">灼熱倶楽部</span>
  </a>
  <button class="menu-btn" id="menuBtn" aria-label="メニューを開く" aria-expanded="false">≡</button>
  <nav>
    <ul id="navList">
      <li><a href="index.html">HOME</a></li>
      <li><a href="blog.html">BLOG</a></li>
      <li><a href="playlist.html" class="active">PLAYLIST</a></li>
      <li><a href="gallery.html">GALLERY</a></li>
      <li><a href="about.html">ABOUT</a></li>
    </ul>
  </nav>
</header>

<section class="page-head">
  <p class="label">NOW PLAYING</p>
  <h1 class="jp-head">PLAYLIST</h1>
  <p>今よく聴いてる曲たち。気分で随時更新。</p>
</section>

<!--
  ▼曲の追加方法
  .track を丸ごとコピペして、曲名・アーティスト名・一言コメントを書き換えるだけでOK
-->
<section class="playlist">

  <article class="track">
    <div class="track-icon">🎵</div>
    <div class="track-body">
      <div class="track-meta">
        <span class="track-title">曲名をここに</span>
        <span class="track-artist">/ アーティスト名</span>
      </div>
      <p class="track-comment">一言コメントをここに。</p>
    </div>
  </article>

  <article class="track">
    <div class="track-icon">🎵</div>
    <div class="track-body">
      <div class="track-meta">
        <span class="track-title">曲名をここに</span>
        <span class="track-artist">/ アーティスト名</span>
      </div>
      <p class="track-comment">一言コメントをここに。</p>
    </div>
  </article>

  <article class="track">
    <div class="track-icon">🎵</div>
    <div class="track-body">
      <div class="track-meta">
        <span class="track-title">STAND UP TO THE VICTORY～トゥ・ザ・ヴィクトリー～（Vガンダム）</span>
        <span class="track-artist">/ 川添智久</span>
      </div>
      <p class="track-comment">スタンダップトゥーザビクトリィ！！！！</p>
    </div>
  </article>

</section>

<footer>
  <p class="en-head">ANISONG CLUB</p>
  <p>&copy; 2026 灼熱アニソン倶楽部 — 非公式ファンサイトです。</p>
</footer>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const navList = document.getElementById('navList');
  menuBtn.addEventListener('click', () => {
    const isOpen = navList.classList.toggle('open');
    menuBtn.setAttribute('aria-expanded', isOpen);
  });
</script>

</body>
</html>
